version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hs_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hs_network
    restart: always

  backend:
    build: ./backend
    container_name: hs_backend
    ports:
      - "5000:5000"
      - "514:514/udp"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/hackersafe
      - JWT_SECRET=supersecretcybersecuritykey12345!
      - SYSLOG_PORT=514
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - hs_network
    restart: always

  frontend:
    build: ./frontend
    container_name: hs_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
    depends_on:
      - backend
    networks:
      - hs_network
    restart: always

volumes:
  mongo_data:

networks:
  hs_network:
    driver: bridge
